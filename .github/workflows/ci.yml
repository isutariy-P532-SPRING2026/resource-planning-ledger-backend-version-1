name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rpl
          POSTGRES_USER: rpl
          POSTGRES_PASSWORD: rpl
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Run tests
        run: mvn -q test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/rpl
          SPRING_DATASOURCE_USERNAME: rpl
          SPRING_DATASOURCE_PASSWORD: rpl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-report
          path: target/surefire-reports/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Build JAR
        run: mvn -q package -DskipTests
      - name: Build Docker image
        run: docker build -t rpl .

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
