version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rpl
      POSTGRES_USER: rpl
      POSTGRES_PASSWORD: rpl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpl"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rpl
      SPRING_DATASOURCE_USERNAME: rpl
      SPRING_DATASOURCE_PASSWORD: rpl
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
